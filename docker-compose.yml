services:
  web:
    build: .
    container_name: audio_web
    ports:
      - "5001:5001"
    volumes:
      - "./uploads:/app/uploads"
      - "./transcripts:/app/transcripts"
      - "./logs:/app/logs"
    environment:
      # Redis Cloud configuration
      - REDIS_HOST=redis-12617.c330.asia-south1-1.gce.redns.redis-cloud.com
      - REDIS_PORT=12617
      - REDIS_PASSWORD=BtUjzw407WUWoZueZH5fEb2mdf51oOSC
      - FLASK_PORT=5001
    command: python app.py

  transcription_worker:
    build: .
    container_name: audio_transcription_worker
    volumes:
      - "./uploads:/app/uploads"
      - "./transcripts:/app/transcripts"
      - "./logs:/app/logs"
    environment:
      # Redis Cloud configuration
      - REDIS_HOST=redis-12617.c330.asia-south1-1.gce.redns.redis-cloud.com
      - REDIS_PORT=12617
      - REDIS_PASSWORD=BtUjzw407WUWoZueZH5fEb2mdf51oOSC
      # Add the missing PROCESSED_FOLDER configuration
      - PROCESSED_FOLDER=/app/transcripts
    command: python workers/transcription_worker.py
    restart: unless-stopped